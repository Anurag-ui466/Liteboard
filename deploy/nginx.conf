# LiteBoard Cloud — studio server (nginx alternative to Caddy).
# Pair with certbot for TLS (certbot edits/duplicates this server block for 443).
# Replace server_name and confirm the root points at the live release's web/ folder.

server {
    listen 80;
    server_name art-board.example.studio;

    root /srv/liteboard/current/web;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Mirror the dev server: disable caching so every deploy shows immediately on reload.
    add_header Cache-Control "no-store" always;

    # Belt-and-suspenders: never serve dev auto-login credentials, even if present.
    location = /config.local.js { return 404; }

    location / {
        try_files $uri $uri/ =404;
    }
}
