<style>
  :root{ --bg:#f5f5f7; --panel:#ffffff; --ink:#1d1d1f; --muted:#86868b; --accent:#0071e3; --gold:#0071e3; --line:#e3e3e6; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
  #bar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;padding:0 16px;z-index:50;flex-wrap:nowrap;overflow-x:auto}
  #bar b{color:var(--ink);font-weight:600;margin-right:6px;white-space:nowrap;font-size:15px}
  .btn{background:#f0f0f3;color:var(--ink);border:1px solid transparent;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s}
  .btn:hover{background:#e6e6ea}.btn:active{background:#dcdce0}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.gold,.btn.on{background:var(--accent);color:#fff}
  .btn.gold:hover,.btn.on:hover{background:#0077ed}
  .sp{flex:1}
  .grp{display:flex;align-items:center;gap:5px;border-left:1px solid var(--line);padding-left:9px;margin-left:3px}
  #hint{font-size:11px;color:var(--muted);white-space:nowrap;flex:0 0 auto;padding-left:10px}
  input[type=range]{width:70px;accent-color:var(--accent)}
  input[type=color]{border:1px solid var(--line);border-radius:6px;background:#fff;width:30px;height:28px;padding:2px;cursor:pointer}
  #viewport{position:fixed;top:52px;left:0;right:0;bottom:44px;overflow:hidden;cursor:grab;background-color:#f5f5f7;background-image:linear-gradient(#e6e6e9 1px,transparent 1px),linear-gradient(90deg,#e6e6e9 1px,transparent 1px);background-size:110px 110px}
  #viewport.panning{cursor:grabbing}
  #viewport.pen{cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='30'%20height='30'%3E%3Cpath%20d='M22%203%20l5%205%20-14%2014%20-6%201%201%20-6z'%20fill='%23d9a441'%20stroke='%23231d12'%20stroke-width='1.3'/%3E%3Cpath%20d='M8%2022%20l6%20-1%20-5%20-5z'%20fill='%23231d12'/%3E%3Cpath%20d='M19%206%20l5%205'%20stroke='%23fff7e6'%20stroke-width='1'/%3E%3C/svg%3E") 7 23, crosshair}
  #viewport.erase{cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='28'%20height='28'%3E%3Crect%20x='4'%20y='10'%20width='17'%20height='11'%20rx='2'%20transform='rotate(-20%2012%2015)'%20fill='%23e7b6a8'%20stroke='%23231d12'%20stroke-width='1.3'/%3E%3C/svg%3E") 12 15, cell}
  #viewport.select{cursor:default}
  #viewport.hand{cursor:grab}
  #viewport.hand.panning{cursor:grabbing}
  #viewport.fdraw{cursor:crosshair}
  body.handon .card,body.handon .frame,body.handon #strokebox,body.handon .htmlhost{pointer-events:none!important}
  body.handon #ink path{pointer-events:none!important}
  body.handon .card .resize,body.handon .card .eresize,body.handon .frame .fresize,body.handon #strokebox .shandle{pointer-events:auto!important}
  #viewport.drop{outline:3px dashed var(--accent);outline-offset:-8px}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0}
  #ink{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:20}
  .zone{position:absolute;border:1.5px dashed;border-radius:18px;opacity:.55;pointer-events:none}
  .zone .zlabel{position:absolute;top:-12px;left:18px;background:var(--bg);padding:0 8px;font-size:12px;font-weight:600}
  .frame{position:absolute;border:1.6px dashed;border-radius:18px;background:rgba(255,255,255,.28);z-index:3;pointer-events:none}
  .frame .fhd{position:absolute;top:-30px;left:8px;display:flex;gap:8px;align-items:center;font-size:12px;background:#fff;padding:4px 10px;border-radius:9px;cursor:move;user-select:none;pointer-events:auto;border:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .frame .fhd .ftt{font-weight:600;outline:none}
  .frame .fhd .fcol{width:20px;height:18px;border:none;background:none;padding:0;cursor:pointer}
  .frame .fhd .fpng,.frame .fhd .fpdf{font-size:10px;opacity:.85;cursor:pointer;border:1px solid currentColor;border-radius:5px;padding:1px 5px}
  .frame .fhd .ffill{cursor:pointer;font-size:12px;line-height:1;opacity:.85;padding:0 2px}
  .frame .fhd .ffill:hover{opacity:1}
  .frame .fhd .fx{cursor:pointer;opacity:.5}.frame .fhd .fx:hover{opacity:1;color:#ff3b30}
  .frame .fresize{position:absolute;right:-2px;bottom:-2px;width:18px;height:18px;cursor:nwse-resize;pointer-events:auto;background:linear-gradient(135deg,transparent 45%,currentColor 45%);opacity:.55}
  .card{position:absolute;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);min-width:150px;max-width:360px;overflow:hidden;z-index:10}
  .card.sel{outline:2px solid var(--accent);outline-offset:1px;box-shadow:0 0 0 4px rgba(0,113,227,.18),0 10px 26px rgba(0,0,0,.14)}
  .card .hd{display:flex;align-items:center;gap:6px;background:#fbfbfd;padding:7px 10px;cursor:move;font-size:11px;color:var(--muted);user-select:none;border-bottom:1px solid var(--line)}
  .card .hd .ttl{flex:1;color:var(--ink);font-weight:600;outline:none}
  .card .hd .x{cursor:pointer;color:var(--muted);padding:0 4px}.card .hd .x:hover{color:#ff3b30}
  .card .hd .ok,.frame .fhd .fok{cursor:pointer;color:#c7c7cc;padding:0 2px;font-weight:700}
  .card .hd .ok:hover,.frame .fhd .fok:hover{color:#34c759}
  .card.approved{border:2.5px solid #34c759 !important}
  .card.rejected{border:2.5px solid #ff3b30 !important}
  .card.rejected .hd .x{color:#ff3b30}
  .card.approved .hd .ok{color:#34c759}
  .card .hd .lk,.frame .fhd .flk{cursor:pointer;color:#c4c4cc;padding:0 2px;display:inline-flex;align-items:center;transition:color .15s}
  .card .hd .lk svg,.frame .fhd .flk svg,#rail .tool svg{display:block}
  #rail .tool svg{width:19px;height:19px}
  .card .hd .lk:hover,.frame .fhd .flk:hover{color:var(--ink)}
  .card.locked .hd .lk,.frame.locked .fhd .flk{color:#ff9500;filter:drop-shadow(0 0 3px rgba(255,149,0,.5))}
  .card.locked .resize,.frame.locked .fresize{display:none}
  .card.locked .hd,.frame.locked .fhd{cursor:default}
  .card.approved .hd .ok,.frame.approved .fhd .fok{color:#34c759}
  .frame.sel{outline:2px solid var(--accent);outline-offset:2px}
  .card img,.card video{display:block;width:100%;max-height:320px;object-fit:cover;background:#f0f0f2}
  .card iframe.pdfframe{flex:1 1 auto;width:100%;border:0;background:#fff;min-height:200px}
  .card.has-w{max-width:none}.card.has-w img,.card.has-w video{max-height:none}
  .card .note{padding:9px 12px;font-size:13px;line-height:1.5;outline:none;min-height:20px;color:var(--ink)}
  .card .harvest{padding:7px 12px;border-top:1px solid var(--line);font-size:12px;color:var(--accent);font-weight:500;outline:none}
  .card .harvest:empty:before{content:'+ what we harvest…';color:#b6b6bb}
  .card .addimg{padding:7px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);cursor:pointer;text-align:center}
  .card .addimg:hover{color:var(--accent)}
  .card .resize{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;z-index:12;background:linear-gradient(135deg,transparent 45%,#c7c7cc 45%);border-bottom-right-radius:14px}
  .card .eresize{position:absolute;top:8px;right:-3px;width:8px;bottom:16px;cursor:ew-resize;z-index:11}
  .card .eresize:hover{background:rgba(0,113,227,.35);border-radius:3px}
  .card.stamp{background:transparent;border:none;box-shadow:none;border-radius:0;min-width:0;overflow:visible}
  .card.stamp .resize{background:linear-gradient(135deg,transparent 50%,#c7c7cc 50%)}
  .card.stamp.sel{outline:2px solid var(--accent);outline-offset:4px;border-radius:12px}
  .stampicon{display:flex;align-items:center;justify-content:center;font-weight:800;line-height:1;width:100%;text-shadow:0 2px 6px rgba(0,0,0,.25);user-select:none;cursor:move}
  .card.shape{background:transparent;border:none;box-shadow:none;border-radius:0;min-width:0;max-width:none;overflow:visible;padding:0;display:block}
  .card.shape .shapesvg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .card.shape .shapetext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 10px;font-size:14px;font-weight:600;line-height:1.35;outline:none;pointer-events:none;word-break:break-word;overflow:hidden}
  .card.shape .scol{position:absolute;left:-11px;top:-11px;width:22px;height:22px;border:2px solid #fff;border-radius:50%;padding:0;cursor:pointer;display:none;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:13;-webkit-appearance:none;appearance:none;background:none}
  .card.shape .scol::-webkit-color-swatch-wrapper{padding:0}.card.shape .scol::-webkit-color-swatch{border:none;border-radius:50%}
  .card.shape.sel .scol{display:block}
  .card.shape.sel{outline:2px solid var(--accent);outline-offset:5px;border-radius:6px}
  .card.shape .resize{background:linear-gradient(135deg,transparent 50%,#c7c7cc 50%)}
  #shapemenu{position:fixed;display:none;flex-direction:column;gap:2px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:12px;padding:6px;z-index:85;box-shadow:0 10px 32px rgba(0,0,0,.18)}
  #shapemenu button{width:40px;height:40px;border:none;background:transparent;border-radius:9px;font-size:19px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center}
  #shapemenu button:hover{background:#ececed}
  .st-tick{color:#34c759}.st-cross{color:#ff3b30}
  .rich{padding:9px 12px;font-size:14px;line-height:1.55;outline:none;min-height:30px;color:var(--ink);word-break:break-word}
  .rich a{color:var(--accent)}
  .rich h1,.rich h2,.rich h3{margin:.25em 0;color:#000;line-height:1.2}
  .rich blockquote{border-left:3px solid var(--accent);margin:.3em 0;padding-left:10px;color:var(--muted)}
  #pages{position:fixed;bottom:0;left:0;right:0;height:44px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--line);display:flex;align-items:center;gap:5px;padding:0 12px;z-index:50;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;background:transparent;border:1px solid transparent;border-radius:9px;padding:7px 13px;font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;font-weight:500}
  .tab:hover{background:#ececee}
  .tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.12);font-weight:600}
  .tab .tx{opacity:.5;font-size:11px}.tab .tx:hover{opacity:1;color:#ff3b30}
  #marquee{position:fixed;display:none;border:1px solid var(--accent);background:rgba(0,113,227,.1);z-index:60;pointer-events:none;border-radius:4px}
  #strokebox{position:absolute;border:1px dashed var(--accent);pointer-events:auto;cursor:move;z-index:21;background:rgba(0,113,227,.04)}
  #strokebox .shandle{position:absolute;right:-7px;bottom:-7px;width:14px;height:14px;background:#fff;border:2px solid var(--accent);border-radius:3px;cursor:nwse-resize;pointer-events:auto}
  #rtbar{position:fixed;top:60px;left:50%;transform:translateX(-50%);display:none;gap:4px;align-items:center;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:12px;padding:7px 10px;z-index:80;box-shadow:0 10px 32px rgba(0,0,0,.16);flex-wrap:wrap;max-width:96vw}
  #rtbar button,#rtbar select,#rtbar input{background:#f0f0f3;color:var(--ink);border:1px solid transparent;border-radius:7px;font-size:13px;cursor:pointer;padding:5px 8px;height:30px}
  #rtbar button:hover{background:#e6e6ea}
  #rtbar .sep{width:1px;height:20px;background:var(--line);margin:0 3px}
  #toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.92);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;z-index:99;font-weight:500;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}

  #rail{position:fixed;left:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--line);border-radius:16px;padding:8px 7px;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.14);max-height:calc(100vh - 150px);overflow-y:auto}

function hexA(h,a){h=(h||'#0071e3').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function _hex2rgb(h){h=(h||'#cccccc').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return [(n>>16)&255,(n>>8)&255,n&255];}
function shadeDarker(h){const c=_hex2rgb(h),f=0.72;return '#'+c.map(x=>('0'+Math.round(x*f).toString(16)).slice(-2)).join('');}
function shapeTextColor(h){const c=_hex2rgb(h),L=0.299*c[0]+0.587*c[1]+0.114*c[2];return L>150?'#1d1d1f':'#ffffff';}
function B(){return doc.pages[doc.cur]}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1500)}

// ---------- seed ----------
function zone(x,y,w,h,label,color){return {x,y,w,h,label,color}}
function note(x,y,title,n,harvest,color){return {id:uid(),type:'note',x,y,title,note:n,harvest,color:color||'#262320'}}
function gridPage(name,specs,accent){const cards=[],per=4,W=380,H=250;specs.forEach((s,i)=>{const c=i%per,r=Math.floor(i/per);cards.push(note(40+c*W,70+r*H,s[0],s[1],s[2],'#2a2520'));});return {name,view:{x:40,y:20,k:.7},strokes:[],zones:[zone(20,30,Math.min(specs.length,per)*W+10,(Math.floor((specs.length-1)/per)+1)*H+50,name,accent||'#d9a441')],cards};}

function defaultDoc(){return {cur:0,pages:[{name:'Page 1',view:{x:40,y:20,k:.8},strokes:[],zones:[],frames:[],cards:[]}]};}
// ---------- view / persist / history ----------
function applyView(){const v=B().view;canvas.style.transform=`translate(${v.x}px,${v.y}px) scale(${v.k})`}
function snap(){return JSON.stringify(doc)}
function autosave(){try{if(_hasBigMedia())return;var s=snap();if(s.length>3000000){return;}localStorage.setItem('adp_lb_doc_v2',s);}catch(e){}}
function scheduleCommit(){clearTimeout(cTimer);cTimer=setTimeout(commit,450);}
function commit(){const s=histSnap();if(s!==lastSnap){if(lastSnap!==null){histPast.push(lastSnap);histFuture=[];}while(histPast.length>200)histPast.shift();lastSnap=s;updateHistUI();autosave();}}
function persist(){scheduleCommit();}
function _iou(a,b){const x1=Math.max(a.x,b.x),y1=Math.max(a.y,b.y),x2=Math.min(a.x+a.w,b.x+b.w),y2=Math.min(a.y+a.h,b.y+b.h);const iw=Math.max(0,x2-x1),ih=Math.max(0,y2-y1);const inter=iw*ih,uni=a.w*a.h+b.w*b.h-inter;return uni>0?inter/uni:0;}
function frameDedupe(p){if(!p.frames||p.frames.length<2)return;const keep=[];p.frames.forEach(f=>{const dup=keep.find(g=>g.label===f.label&&_iou(g,f)>0.5);if(!dup)keep.push(f);});if(keep.length!==p.frames.length)p.frames=keep;}
function absorbZones(p){if(!p.zones||!p.zones.length)return;p.frames=p.frames||[];p.zones.forEach(z=>{const dup=p.frames.some(f=>Math.abs(f.x-z.x)<6&&Math.abs(f.y-z.y)<6&&Math.abs(f.w-z.w)<6&&Math.abs(f.h-z.h)<6);if(!dup)p.frames.push({id:uid(),x:z.x,y:z.y,w:z.w,h:z.h,label:z.label||'Section',color:z.color||'#0071e3'});});p.zones=[];}
function normalize(){if(!doc||!doc.pages||!doc.pages.length)doc=defaultDoc();doc.pages.forEach(p=>{p.strokes=p.strokes||[];p.view=p.view||{x:40,y:20,k:.6};p.zones=p.zones||[];p.cards=p.cards||[];p.frames=p.frames||[];absorbZones(p);frameDedupe(p);});if(doc.cur>=doc.pages.length)doc.cur=0;}
function undo(){commit();if(!histPast.length)return;histFuture.push(histSnap());const prev=histPast.pop();doc=rehydrate(JSON.parse(prev));lastSnap=prev;normalize();render();autosave();updateHistUI();}
function redo(){if(!histFuture.length)return;histPast.push(histSnap());const nxt=histFuture.pop();doc=rehydrate(JSON.parse(nxt));lastSnap=nxt;normalize();render();autosave();updateHistUI();}
function updateHistUI(){document.getElementById('undobtn').disabled=!histPast.length;document.getElementById('redobtn').disabled=!histFuture.length;}
function toCanvas(cx,cy){const r=vp.getBoundingClientRect(),v=B().view;return {x:(cx-r.left-v.x)/v.k,y:(cy-r.top-v.y)/v.k}}
// ---------- render ----------
function render(){
  [...canvas.querySelectorAll('.zone,.card,.frame')].forEach(n=>n.remove());
  absorbZones(B());
  (B().frames||[]).forEach(f=>canvas.insertBefore(buildFrame(f),ink));
  B().cards.forEach(c=>canvas.insertBefore(buildCard(c),ink));
  renderInk();renderTabs();applyView();updateHistUI();applySel();
}
function renderTabs(){const bar=document.getElementById('pages');bar.innerHTML='';
  doc.pages.forEach((p,i)=>{const t=document.createElement('div');t.className='tab'+(i===doc.cur?' active':'');t.innerHTML=`<span class="nm">${p.name}</span><span class="tx">✕</span>`;
    t.querySelector('.nm').onclick=()=>{doc.cur=i;persist();render()};
    t.querySelector('.nm').ondblclick=()=>{const n=prompt('Rename page:',p.name);if(n){p.name=n;persist();render()}};
    t.querySelector('.tx').onclick=(e)=>{e.stopPropagation();if(doc.pages.length<2){alert('Keep at least one page');return;}inlineConfirm(e.target,'Delete "'+p.name+'"?',()=>{doc.pages.splice(i,1);if(doc.cur>=doc.pages.length)doc.cur=doc.pages.length-1;persist();render();});};
    bar.appendChild(t);});
  const add=document.createElement('button');add.className='btn';add.textContent='+ Page';add.onclick=addPage;bar.appendChild(add);
}
function buildCard(c){
  const el=document.createElement('div');el.className='card';el.dataset.id=c.id;el.style.left=c.x+'px';el.style.top=c.y+'px';if(c.color)el.style.borderTop='3px solid '+c.color;if(c.w){el.style.width=c.w+'px';el.classList.add('has-w');}if(c.h)el.style.height=c.h+'px';
  if(c.type==='stamp'){el.classList.add('stamp');const ic=document.createElement('div');ic.className='stampicon '+(c.kind==='cross'?'st-cross':'st-tick');ic.textContent=c.kind==='cross'?'\u2715':'\u2713';ic.style.fontSize=((c.w||72)*0.74)+'px';el.appendChild(ic);
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('resize'))return;e.preventDefault();selectForDrag(c.id,e.shiftKey);dragCard(c,el,e);});
  const rz=document.createElement('div');rz.className='resize';el.appendChild(rz);

function _parseDate(s){var d=new Date((s||'')+'T00:00:00');return isNaN(d.getTime())?new Date():d;}
function _nextWorkDay(date,skip){var d=new Date(date);d.setDate(d.getDate()+1);if(skip){while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);}return d;}
function _addWorkDays(date,days,skip){var d=new Date(date);var n=Math.max(0,Math.round(days));if(!skip){d.setDate(d.getDate()+n);return d;}var a=0;while(a<n){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)a++;}return d;}
function fmtDate(d){try{return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}catch(e){return ''+d;}}
function scheduleTasks(){
  var P=doc.production,byId={};P.tasks.forEach(function(t){byId[t.id]=t;});
  var start=_parseDate(P.settings.startDate),skip=!!P.settings.skipWeekends,memo={};
  function endOf(id,stack){ if(memo[id])return memo[id]; var t=byId[id]; if(!t)return {start:start,end:start}; stack=stack||{}; if(stack[id]){return memo[id]={start:start,end:_addWorkDays(start,t.dur||1,skip)};} stack[id]=true; var s=new Date(start); (t.deps||[]).forEach(function(dep){ if(byId[dep]){var de=endOf(dep,stack);var c=_nextWorkDay(de.end,skip);if(c>s)s=new Date(c);} }); memo[id]={start:s,end:_addWorkDays(s,Math.max(1,t.dur||1),skip)}; return memo[id]; }
  P.tasks.forEach(function(t){endOf(t.id,{});}); return memo;
}

// --- task CRUD ---
function addTask(){ doc.production.tasks.push({id:uid(),name:'New task',phase:PHASES[0],ownerId:'',status:STATUSES[0],dur:3,deps:[],priority:'Med',approval:'',notes:'',assetId:''}); persist(); render(); }
function delTask(id){ var P=doc.production; P.tasks=P.tasks.filter(function(t){return t.id!==id;}); P.tasks.forEach(function(t){t.deps=(t.deps||[]).filter(function(d){return d!==id;});}); persist(); render(); }
function setTaskField(id,k,v){ var t=doc.production.tasks.find(function(x){return x.id===id;}); if(!t)return; t[k]=v; persist(); render(); }
function addDep(id,dep){ if(!dep||id===dep)return; var t=doc.production.tasks.find(function(x){return x.id===id;}); if(!t)return; t.deps=t.deps||[]; if(t.deps.indexOf(dep)<0)t.deps.push(dep); persist(); render(); }
function rmDep(id,dep){ var t=doc.production.tasks.find(function(x){return x.id===id;}); if(!t)return; t.deps=(t.deps||[]).filter(function(d){return d!==dep;}); persist(); render(); }
function addPerson(){ var n=prompt('Add team member / vendor name:'); if(!n)return; doc.production.people.push({id:uid(),name:n,role:'Artist',type:'internal'}); persist(); render(); }

// --- sheet render ---
function renderSheet(host){ var k=B().kind; if(k==='tasks'){renderTaskSheet(host);} else { host.innerHTML='<div class="sheetwrap"><h2 class="sheettitle">'+B().name+'</h2><p class="emptyhint">This '+k+' sheet arrives in the next phase. The data it needs already lives in the Task list.</p></div>'; } }
function _selCell(opts,val,cb){ var td=document.createElement('td'); var s=document.createElement('select'); s.className='cellsel'; opts.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);}); s.onchange=function(){cb(s.value);}; td.appendChild(s); return td; }
function _selPairs(pairs,val,cb){ var td=document.createElement('td'); var s=document.createElement('select'); s.className='cellsel'; pairs.forEach(function(p){var op=document.createElement('option');op.value=p[0];op.textContent=p[1];if(p[0]===val)op.selected=true;s.appendChild(op);}); s.onchange=function(){cb(s.value);}; td.appendChild(s); return td; }
function renderTaskSheet(host){
  var P=doc.production, sched=scheduleTasks(); host.innerHTML='';
  var wrap=document.createElement('div'); wrap.className='sheetwrap';
  var tb=document.createElement('div'); tb.className='sheettb';
  tb.innerHTML='<button class="btn gold" id="tk_add">+ Task</button><button class="btn" id="tk_person">+ Person</button><span class="sgap"></span>'
    +'<label>Project start <input type="date" id="tk_start" value="'+(P.settings.startDate||'')+'"></label>'
    +'<label><input type="checkbox" id="tk_skip"'+(P.settings.skipWeekends?' checked':'')+'> Skip weekends</label>'
    +'<label>Unit <select id="tk_unit"><option value="day"'+(P.settings.unit==='day'?' selected':'')+'>Days</option><option value="week"'+(P.settings.unit==='week'?' selected':'')+'>Weeks</option></select></label>';
  wrap.appendChild(tb);
  var tbl=document.createElement('table'); tbl.className='tasktbl';
  var thead=document.createElement('thead'); var ul=(P.settings.unit==='week')?'Dur (wk)':'Dur (days)';
  thead.innerHTML='<tr><th>Task</th><th>Phase</th><th>Owner</th><th>'+ul+'</th><th>Depends on</th><th>Start</th><th>End</th><th>Status</th><th>AD</th><th></th></tr>';
  tbl.appendChild(thead);
  var tbody=document.createElement('tbody');
  P.tasks.forEach(function(t){
    var tr=document.createElement('tr'); tr.className='st-'+((t.status||'').toLowerCase().replace(/[^a-z]/g,''));
    var tdN=document.createElement('td'); var inN=document.createElement('input'); inN.className='cellin'; inN.value=t.name||''; inN.onchange=function(){setTaskField(t.id,'name',inN.value);}; tdN.appendChild(inN); tr.appendChild(tdN);
    tr.appendChild(_selCell(PHASES,t.phase,function(v){setTaskField(t.id,'phase',v);}));
    var owners=[['','—']].concat(P.people.map(function(o){return [o.id,o.name];})).concat(P.vendors.map(function(o){return [o.id,o.name+' (vendor)'];}));
    tr.appendChild(_selPairs(owners,t.ownerId||'',function(v){setTaskField(t.id,'ownerId',v);}));
    var tdD=document.createElement('td'); var inD=document.createElement('input'); inD.type='number'; inD.min='1'; inD.step=(P.settings.unit==='week')?'0.5':'1'; inD.className='cellnum'; inD.value=(P.settings.unit==='week')?((t.dur||1)/5):(t.dur||1); inD.onchange=function(){var v=parseFloat(inD.value)||1;setTaskField(t.id,'dur',(P.settings.unit==='week')?Math.max(1,Math.round(v*5)):Math.max(1,Math.round(v)));}; tdD.appendChild(inD); tr.appendChild(tdD);
    var tdDep=document.createElement('td'); tdDep.className='depcell';
    (t.deps||[]).forEach(function(dep){var dt=P.tasks.find(function(x){return x.id===dep;});if(!dt)return;var chip=document.createElement('span');chip.className='chip';chip.textContent=dt.name;var x=document.createElement('b');x.textContent='×';x.onclick=function(){rmDep(t.id,dep);};chip.appendChild(x);tdDep.appendChild(chip);});
    var addsel=document.createElement('select'); addsel.className='depadd'; var o0=document.createElement('option'); o0.value=''; o0.textContent='+ dep'; addsel.appendChild(o0);
    P.tasks.forEach(function(ot){if(ot.id===t.id||(t.deps||[]).indexOf(ot.id)>=0)return;var o=document.createElement('option');o.value=ot.id;o.textContent=ot.name;addsel.appendChild(o);});
    addsel.onchange=function(){if(addsel.value)addDep(t.id,addsel.value);}; tdDep.appendChild(addsel); tr.appendChild(tdDep);
    var sc=sched[t.id]||{start:new Date(),end:new Date()};
    var tdS=document.createElement('td'); tdS.className='datecell'; tdS.textContent=fmtDate(sc.start); tr.appendChild(tdS);
    var tdE=document.createElement('td'); tdE.className='datecell'; tdE.textContent=fmtDate(sc.end); tr.appendChild(tdE);
    tr.appendChild(_selCell(STATUSES,t.status,function(v){setTaskField(t.id,'status',v);}));
    var tdA=document.createElement('td'); var ok=document.createElement('span'); ok.className='apprtgl '+(t.approval==='approved'?'ap-ok':(t.approval==='changes'?'ap-no':'')); ok.textContent=(t.approval==='approved'?'✓':(t.approval==='changes'?'✕':'•')); ok.title='Art-Director approval (click to cycle)'; ok.onclick=function(){var nx=(t.approval==='approved')?'changes':((t.approval==='changes')?'':'approved');setTaskField(t.id,'approval',nx);}; tdA.appendChild(ok); tr.appendChild(tdA);
    var tdX=document.createElement('td'); var del=document.createElement('span'); del.className='rowdel'; del.textContent='🗑'; del.onclick=function(e){inlineConfirm(e.target,'Delete task?',function(){delTask(t.id);});}; tdX.appendChild(del); tr.appendChild(tdX);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl);
  if(!P.tasks.length){var hint=document.createElement('p');hint.className='emptyhint';hint.textContent='No tasks yet. Click “+ Task” to add one. Set a duration and dependencies — Start/End dates schedule themselves.';wrap.appendChild(hint);}
  host.appendChild(wrap);
  tb.querySelector('#tk_add').onclick=function(){addTask();};
  tb.querySelector('#tk_person').onclick=function(){addPerson();};
  tb.querySelector('#tk_start').onchange=function(e){doc.production.settings.startDate=e.target.value;persist();render();};
  tb.querySelector('#tk_skip').onchange=function(e){doc.production.settings.skipWeekends=e.target.checked;persist();render();};
  tb.querySelector('#tk_unit').onchange=function(e){doc.production.settings.unit=e.target.value;persist();render();};
}

// ---------- boot ----------
(function(){try{const s=localStorage.getItem('adp_lb_doc_v2');doc=s?JSON.parse(s):defaultDoc();}catch(e){doc=defaultDoc();}normalize();lastSnap=histSnap();render();})();
</script>
</body>
